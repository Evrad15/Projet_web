[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'libzip', 'icu']

[phases.build]
cmds = [
  'composer install --optimize-autoloader --no-scripts --no-interaction',
  'php artisan config:cache',
  'php artisan route:cache',
  'php artisan view:cache'
]

[variables]
NIXPACKS_PHP_EXTENSIONS = 'intl,zip,pdo_mysql,bcmath,opcache'