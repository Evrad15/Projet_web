[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'php82Extensions.zip', 'php82Extensions.intl', 'php82Extensions.pdo_mysql', 'php82Extensions.bcmath', 'php82Extensions.redis', 'php82Extensions.opcache']

[phases.build]
cmds = [
  'composer install --optimize-autoloader --no-scripts --no-interaction',
  'php artisan config:cache',
  'php artisan route:cache',
  'php artisan view:cache'
]

[variables]
NIXPACKS_PHP_EXTENSIONS = 'intl,zip,pdo_mysql,bcmath,redis,opcache'